name: CI
on:
  pull_request:
  workflow_call:

permissions:
  contents: read
  # Needed for workload identity federation
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VIVADO_VERSION: "2024.1"
  # Release tag from https://github.com/lowRISC/lowrisc-toolchains/releases
  TOOLCHAIN_VERSION: 20220210-1

jobs:
  quick_lint:
    name: Lint (quick)
    runs-on:
      group: pavona-basic
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Required so we can lint commit messages.
      - name: Prepare environment
        uses: ./.github/actions/prepare-env
      - name: Show environment
        run: ./ci/scripts/show-env.sh
      - name: Commit metadata
        run: ./ci/scripts/lint-commits.sh "$GITHUB_BASE_REF"
        if: ${{ github.event_name == 'pull_request' }}
      - name: License headers
        run: ./ci/scripts/check-licence-headers.sh "$GITHUB_BASE_REF"
        if: ${{ github.event_name == 'pull_request' }}
      - name: Executable bits
        run: ./ci/scripts/exec-check.sh
      - name: Non-ASCII characters
        run: ./ci/scripts/check-ascii.sh
      - name: Check Bazel build graph
        run: ./bazelisk.sh build --nobuild //...
      - name: Python (flake8)
        run: ./ci/scripts/python-lint.sh "$GITHUB_BASE_REF"
        if: ${{ github.event_name == 'pull_request' }}
      - name: Python (mypy)
        run: ./ci/scripts/mypy.sh
      - name: Python (ruff)
        run: ruff check
      - name: Validate testplans with schema
        run: ./ci/scripts/validate_testplans.sh
      - name: C/C++ formatting
        run: ./bazelisk.sh test //quality:clang_format_check
      - name: Rust formatting
        run: ./bazelisk.sh test //quality:rustfmt_check
      - name: Shellcheck
        run: ./bazelisk.sh test //quality:shellcheck_check
      - name: Header guards
        run: ./ci/scripts/include-guard.sh "$GITHUB_BASE_REF"
        if: ${{ github.event_name == 'pull_request' }}
      - name: Trailing whitespace
        run: ./ci/scripts/whitespace.sh "$GITHUB_BASE_REF"
        if: ${{ github.event_name == 'pull_request' }}
      - name: Broken links
        run: ./ci/scripts/check-links.sh
      - name: Lint Doxygen comments (cryptolib)
        run: ./bazelisk.sh run @doxygen//:bin/doxygen quality/Doxyfile.lint
      - name: Lock files
        run: ./ci/scripts/check-lock-files.sh

  slow_lint:
    name: Lint (slow)
    runs-on:
      group: pavona-basic
    needs: quick_lint
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Bitstream cache requires all commits.
      - name: Prepare environment
        uses: ./.github/actions/prepare-env
        with:
          install-verible: true
      - name: Countermeasures implemented (egret)
        run: ./ci/scripts/check-countermeasures.sh egret
      - name: Countermeasures implemented (scafi_deprecated)
        run: ./ci/scripts/check-countermeasures.sh scafi_deprecated
      - name: Bazel test suite tags
        run: ./ci/scripts/check_bazel_test_suites.py
        continue-on-error: true
      # See #21973: disabled until Verilator tags are fixed.
      # - name: Check Bazel tags
      #   run: ./ci/scripts/check-bazel-tags.sh
      #   continue-on-error: true
      - name: Banned Bazel rules
        run: ./ci/scripts/check-bazel-banned-rules.sh
      - name: Bazel target names
        run: ./ci/scripts/check_bazel_target_names.py
      - name: DV software images
        run: ./ci/scripts/check_dv_sw_images.sh
        continue-on-error: true
      - name: Build documentation
        run: ./ci/scripts/build-docs.sh
      - name: Generated files
        run: ./ci/scripts/check-generated.sh
        env:
          OT_DESTRUCTIVE: 1 # Required by the script to clean up.
      - name: Check sim_cfg files
        run: ./ci/scripts/check-sim-cfgs.py
      - name: Buildifier
        run: ./bazelisk.sh test //quality:buildifier_check
      - name: Vendored files
        run: ./ci/scripts/check-vendoring.sh
      - name: Verible RTL egret
        run: ./ci/scripts/verible-lint.sh rtl egret
      - name: Verible DV egret
        run: ./ci/scripts/verible-lint.sh dv egret
      - name: Verible FPV egret
        run: ./ci/scripts/verible-lint.sh fpv egret
      - name: Verible RTL dragonfly
        run: ./ci/scripts/verible-lint.sh rtl dragonfly
      - name: Verible DV dragonfly
        run: ./ci/scripts/verible-lint.sh dv dragonfly
      - name: Verible FPV dragonfly
        run: ./ci/scripts/verible-lint.sh fpv dragonfly
      - name: Validate alert classification for Egret
        run: ./ci/scripts/validate_alert_classification.py egret hw/top_egret/ip_autogen/alert_handler/data/top_egret_alert_handler.ipconfig.hjson "$(realpath hw/top_egret/data/otp/otp_ctrl_img_owner_sw_cfg.hjson)"
      - name: Validate alert classification for Dragonfly
        run: ./ci/scripts/validate_alert_classification.py dragonfly hw/top_dragonfly/ip_autogen/alert_handler/data/top_dragonfly_alert_handler.ipconfig.hjson "$(realpath hw/top_dragonfly/data/otp/otp_ctrl_img_owner_sw_cfg.hjson)"

  dependency-licenses:
    name: Check software dependency licenses
    runs-on:
      group: pavona-basic
    needs: quick_lint
    steps:
      - uses: actions/checkout@v7
      - name: Prepare environment
        uses: ./.github/actions/prepare-env
      - name: Check Python licenses
        run: |
          ALLOWED=(
            'apache'
            'Apache-2.0'
            'Apache Software License'
            'BSD'
            'BSD-3-Clause'
            'BSD License'
            'Freeware'
            'GNU Lesser General Public License v2 or later (LGPLv2+)'
            'GNU Lesser General Public License v3 (LGPLv3)'
            'GNU Library or Lesser General Public License (LGPL)'
            'MIT'
            'MIT License'
            'Mozilla Public License 2.0 (MPL 2.0)'
            'MPL-2.0 AND MIT'
            'Public Domain'
            'Python Software Foundation License'
            'UNKNOWN'
          )
          ALLOWED_SEMI=${ALLOWED[0]}
          for lic in "${ALLOWED[@]}"; do
              ALLOWED_SEMI="$ALLOWED_SEMI;$lic"
          done;
          pip-licenses --allow-only "$ALLOWED_SEMI"
      - name: Install cargo
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "~/.cargo/bin" >> "$GITHUB_PATH"
      - name: Check Rust licenses
        run: |
          cargo install cargo-deny --version 0.18.4
          cargo deny --all-features --manifest-path third_party/rust/Cargo.toml check licenses
          cargo deny --all-features --manifest-path third_party/tock/Cargo.toml check licenses

  verible_lint:
    name: Verible lint
    permissions:
      contents: read
      id-token: write
      pull-requests: write # Add comments to pull requests
    runs-on:
      group: pavona-basic
    needs: quick_lint
    if: ${{ github.event_name == 'pull_request' }}
    env:
      verible_config: hw/lint/tools/veriblelint/lowrisc-styleguide.rules.verible_lint
      verible_version: v0.0-3430-g060bde0f
    steps:
      - uses: actions/checkout@v7
      - name: Prepare Verible config
        run: |
          echo "Concatenating Verible waivers"
          find . -type f -name '*.vbl' -exec cat {} \; >> verible_waiver

          echo "::group::Verible config"
          cat "$verible_config"
          echo "::endgroup::"

          echo "::group::Verible waiver"
          cat "verible_waiver"
          echo "::endgroup::"
      - name: Install Verible
        uses: ./.github/actions/third_party/verible
        with:
          verible_version: ${{ env.verible_version }}
      - name: Run Verible linter with reviewdog
        shell: bash
        env:
          INPUT_CONFIG_FILE: ${{ env.verible_config }}
          INPUT_EXTRA_ARGS: '--waiver_files=verible_waiver'
          INPUT_EXTENSIONS: ''
          INPUT_FAIL_ON_ERROR: 'false'
          INPUT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_LOG_FILE: 'verible-verilog-lint.log'
          INPUT_PATHS: '.'
          INPUT_REVIEWDOG_REPORTER: 'github-pr-check'
          INPUT_SUGGEST_FIXES: 'false'
        run: ./.github/actions/third_party/verible/entrypoint.sh
      - name: Upload Verible linter log
        uses: actions/upload-artifact@v7
        with:
          name: verible-linter
          path: 'verible-verilog-lint.log'

  acc_standalone_tests:
    name: Run ACC smoke Test
    needs: quick_lint
    runs-on:
      group: pavona-basic
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Bitstream cache requires all commits.
      - name: Prepare environment
        uses: ./.github/actions/prepare-env
      - name: Display environment
        run: |
          python3 --version
          fusesoc --version
      - name: ACC ISS test
        run: make -C hw/ip/acc/dv/accsim test
      - name: ACC smoke test
        run: ./hw/ip/acc/dv/smoke/run_smoke.sh
      - name: ACC PQC smoke test
        run: ./hw/ip/acc/dv/smoke_pqc/run_smoke.sh
      - name: Assemble & link code snippets
        run: make -C hw/ip/acc/util asm-check

  acc_crypto_tests:
    name: Run ACC crypto tests
    needs: quick_lint
    runs-on:
      group: pavona-basic
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Bitstream cache requires all commits.
      - name: Prepare environment
        uses: ./.github/actions/prepare-env
      - name: Execute tests
        run: |
          # Limit local number of test jobs to 4 to prevent memory contention
          # from timing out tests.
          ./bazelisk.sh test --test_output=errors --test_tag_filters=-nightly \
            --local_test_jobs=4 --test_timeout=3600 //sw/acc/crypto/...

  verilator_egret:
    name: Egret Verilator Tests
    runs-on:
      group: pavona-large
    needs: quick_lint
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v7
      - name: Prepare environment
        uses: ./.github/actions/prepare-env
      - name: Run fast Verilator tests
        run: ./ci/scripts/run-verilator-tests.sh
      - name: Publish Bazel test results
        uses: ./.github/actions/publish-bazel-test-results
        if: ${{ !cancelled() }}
        with:
          artifact-name: verilator_egret-test-results

  chip_egret_cw310:
    name: Egret for CW310
    needs: quick_lint
    uses: ./.github/workflows/bitstream.yml
    secrets: inherit
    with:
      top_name: egret
      design_suffix: cw310_hyperdebug

  chip_egret_cw340:
    name: Egret for CW340
    needs: quick_lint
    uses: ./.github/workflows/bitstream.yml
    secrets: inherit
    with:
      top_name: egret
      design_suffix: cw340

  # CW310 FPGA jobs
  execute_tests_cw310:
    name: Egret CW310 Tests
    needs: chip_egret_cw310
    uses: ./.github/workflows/egret-cw310-pr.yml
    secrets: inherit
    with:
      bitstream: chip_egret_cw310_hyperdebug

  # CW340 FPGA jobs
  execute_tests_cw340:
    name: Egret CW340 Tests
    needs: chip_egret_cw340
    uses: ./.github/workflows/egret-cw340-pr.yml
    secrets: inherit
    with:
      bitstream: chip_egret_cw340

  sw_build_test:
    name: Build and test software (Egret)
    runs-on:
      group: pavona-large
    timeout-minutes: 120
    needs: quick_lint
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Required for bitstream cache to work.
      - name: Prepare environment
        uses: ./.github/actions/prepare-env
      - name: Check Bazel build graph
        run: |
          # Test the graph with both an empty and filled bitstream cache.
          ./ci/scripts/test-empty-bitstream-cache.sh
          ./bazelisk.sh build --nobuild //...
      - name: Build and test software targets
        run: ./ci/scripts/sw-build-test.sh egret //...
      - name: Publish Bazel test results
        uses: ./.github/actions/publish-bazel-test-results
        if: ${{ !cancelled() }}
        with:
          artifact-name: sw_build_test-test-results
      - name: Check for unrunnable tests
        run: ./ci/scripts/check-unrunnable-tests.sh
        continue-on-error: true

  df_sw_build_test:
    name: Build and test software (Dragonfly)
    runs-on:
      group: pavona-large
    timeout-minutes: 120
    needs: quick_lint
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Required for bitstream cache to work.
      - name: Prepare environment
        uses: ./.github/actions/prepare-env
      - name: Check Bazel build graph
        run: |
          # Test the graph with both an empty and filled bitstream cache.
          ./ci/scripts/test-empty-bitstream-cache.sh
          ./bazelisk.sh build --nobuild --//hw/top=dragonfly //...
      - name: Build and test software targets
        run: ./ci/scripts/sw-build-test.sh dragonfly //...
      - name: Publish Bazel test results
        uses: ./.github/actions/publish-bazel-test-results
        if: ${{ !cancelled() }}
        with:
          artifact-name: sw_build_test-test-results
      - name: Check for unrunnable tests
        run: ./ci/scripts/check-unrunnable-tests.sh
        continue-on-error: true

  qemu_smoketest:
    name: QEMU smoketest
    runs-on:
      group: pavona-basic
    needs: quick_lint
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Prepare environment
        uses: ./.github/actions/prepare-env
      - name: Execute QEMU smoketest
        run: |
          ./bazelisk.sh test //sw/device/tests:rom_exit_immediately_sim_qemu_base

  # We would like to gate PR on quick lint and merge queue on bitstream caching.
  # GitHub requires a single job name to be used for branch protection rule, so we use 2 jobs with
  # conditional names so the non-skipped ones woud be called "Merge blocker".
